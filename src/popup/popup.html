<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=800, initial-scale=1">
  <title>ModNetwork Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header Bar -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="url(#g2)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#g3)" stroke-width="2" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g1" x1="2" y1="2" x2="22" y2="12"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
              <linearGradient id="g2" x1="2" y1="17" x2="22" y2="22"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
              <linearGradient id="g3" x1="2" y1="12" x2="22" y2="17"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
            </defs>
          </svg>
          <span class="logo-text">ModNetwork</span>
        </div>
        <span class="version" id="appVersion">v0.0.0</span>
      </div>
      <div class="header-right">
        <div class="global-toggle" title="Enable extension globally">
            <span class="toggle-label" style="font-size: 11px; font-weight: 600; opacity: 0.8; letter-spacing: 0.5px;">GLOBAL</span>
            <label class="ui-switch">
              <input type="checkbox" id="globalToggle">
              <span class="ui-slider"></span>
            </label>
        </div>
        <div style="width: 1px; height: 16px; background: var(--border-default); margin: 0 8px;"></div>
        <div class="tab-status" id="tabStatus">
          <div class="status-indicator">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">Checking tab...</span>
          </div>
          <button id="toggleBtn" class="btn btn-primary" style="margin-left: 12px; font-weight: bold;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Attach API
          </button>
        </div>
      </div>
    </header>

    <!-- Layout Container (2 Columns) -->
    <div class="layout-container">
      
      <!-- Left Sidebar: Profile Workspaces -->
      <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
          <button class="icon-btn" id="sidebarToggleBtn" title="Toggle Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <span class="sidebar-title">WORKSPACES</span>
          <button class="icon-btn" id="addProfileBtn" title="New Workspace">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
        <div class="profile-list" id="profileList">
          <!-- Profiles injected here -->
        </div>
      </aside>

      <!-- Right Main: Profile Details -->
      <main class="main-content">
        <div class="profile-toolbar">
          <div class="profile-info">
            <h2 class="active-profile-name" id="activeProfileName">Loading...</h2>
            <label class="ui-switch profile-master-toggle" title="Enable/Disable this Workspace">
              <input type="checkbox" id="profileToggle">
              <span class="ui-slider"></span>
            </label>
          </div>
          <button class="icon-btn danger-text" id="deleteProfileBtn" title="Delete Workspace">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
          </button>
        </div>

        <!-- Section: Modify Headers -->
        <section class="category-section" id="cat-ModifyHeader">
          <div class="category-header">
            <svg class="category-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
            <h3>Headers</h3>
          </div>
          <div class="category-body">
            <div id="list-ModifyHeader"></div>
            <button class="btn btn-ghost add-mod-btn" data-type="ModifyHeader" style="align-self: flex-start; margin-top: 4px;">+ Add header modification</button>
          </div>
        </section>

        <!-- Section: Redirects -->
        <section class="category-section" id="cat-Redirect">
          <div class="category-header">
            <svg class="category-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
            <h3>Redirects</h3>
          </div>
          <div class="category-body">
            <div id="list-Redirect"></div>
            <button class="btn btn-ghost add-mod-btn" data-type="Redirect" style="align-self: flex-start; margin-top: 4px;">+ Add redirect</button>
          </div>
        </section>

        <!-- Section: Advanced JS -->
        <section class="category-section collapsed" id="cat-AdvancedJS">
          <div class="category-header">
            <svg class="category-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
            <h3>Advanced Javascript</h3>
          </div>
          <div class="category-body">
            <div id="list-AdvancedJS"></div>
            <button class="btn btn-ghost add-mod-btn" data-type="AdvancedJS" style="align-self: flex-start; margin-top: 4px;">+ Add script</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
