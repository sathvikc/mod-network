<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=360, initial-scale=1">
  <title>ModNetwork</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header Bar -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="url(#g2)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#g3)" stroke-width="2" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g1" x1="2" y1="2" x2="22" y2="12"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
              <linearGradient id="g2" x1="2" y1="17" x2="22" y2="22"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
              <linearGradient id="g3" x1="2" y1="12" x2="22" y2="17"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
            </defs>
          </svg>
          <span class="logo-text">ModNetwork</span>
        </div>
      </div>
      <div class="header-right">
        <div class="tab-status" id="tabStatus">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Inactive</span>
        </div>
        <button class="btn btn-toggle" id="toggleBtn" title="Toggle interception on this tab">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Rules List (compact) -->
    <main class="app-body" id="rulesView">
      <div class="rules-list" id="rulesList">
        <!-- Rules rendered here by JS -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>No rules yet</p>
        <p class="empty-sub">Open Dashboard to create rules</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <label class="global-toggle">
        <input type="checkbox" id="globalToggle" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Global</span>
      </label>
      <button class="btn btn-dashboard" id="openDashboard" title="Open Dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
      <span class="version" id="appVersion"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
